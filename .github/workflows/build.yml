name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build binaries
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p dist
          for OS_ARCH in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            OS="${OS_ARCH%%/*}"
            ARCH="${OS_ARCH##*/}"
            NAME="xray-sub-rotation-${VERSION}-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && NAME="${NAME}.exe"
            EXT="${OS}"
            [ "$OS" = "windows" ] && EXT="zip" || EXT="tar.gz"
            GOOS="$OS" GOARCH="$ARCH" CGO_ENABLED=0 go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/${NAME}" \
              ./cmd/xray-sub-rotation/
            [ "$OS" = "windows" ] \
              && cd dist && zip "${NAME}.zip" "${NAME}" && cd .. \
              || cd dist && tar czf "${NAME}.tar.gz" "${NAME}" && cd ..
          done
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
           files: dist/*
           generate_release_notes: true
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual)
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.version
        with:
           tag_name: ${{ github.event.inputs.version }}
           files: dist/*
           generate_release_notes: true
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
